name: Python CI (dial-reader container)

# Path-filtered: only fires when something under container/dial-reader/
# changed. Worker-only PRs continue to run the existing CI pipeline
# without paying the Python install cost.
#
# We deliberately also fire when this workflow file itself changes so
# a tweak to lint rules or the install step is exercised on the PR
# that introduces it.
on:
  push:
    branches: [main]
    paths:
      - "container/dial-reader/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "container/dial-reader/**"
      - ".github/workflows/python-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-verify:
    name: pytest + ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: container/dial-reader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin uv. astral-sh/setup-uv handles caching of the uv install
      # itself plus optional caching of the resolved venv keyed off
      # uv.lock — that's the slow part.
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Keyed off the lockfile so unrelated source edits don't
          # invalidate the cache; cache restore is a no-op on lockfile
          # changes (uv re-resolves anyway).
          cache-dependency-glob: container/dial-reader/uv.lock

      # `--frozen` requires uv.lock and refuses to mutate it. CI must
      # never silently update the lockfile; if dependencies need to
      # move, the developer regenerates uv.lock locally and commits it.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy src/

      - name: Test (pytest)
        run: uv run pytest
