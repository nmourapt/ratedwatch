name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # `workflow_dispatch` lets the operator re-trigger a deploy from
  # the Actions UI without having to push a no-op commit. The
  # deploy job below has its own `if:` gate so workflow_dispatch
  # runs the deploy too (gated on verify passing first).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if a secrets file made it into the repository.
      # Runtime Worker vars belong in .dev.vars (untracked); Terraform
      # reads .env (also untracked); these filenames are the usual
      # suspects when someone accidentally `git add -f`s a secret.
      - name: Secrets sanity check
        run: |
          set -euo pipefail
          # Any path ending in .dev.vars, .env, or .env.local is a secret.
          # .env.example (anywhere) is the only allowed .env-prefixed file.
          leaked=$(git ls-files -z \
            | tr '\0' '\n' \
            | grep -E '(^|/)(\.dev\.vars|\.env|\.env\.local)$|\.dev\.vars$' \
            | grep -v -E '(^|/)\.env\.example$' || true)
          if [ -n "$leaked" ]; then
            echo "::error::Secret file(s) are tracked in git:"
            echo "$leaked"
            exit 1
          fi
          echo "No committed secret files found."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify generated worker types are in sync
        run: npm run types:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Build precedes test because wrangler.jsonc references
      # assets.directory = ./dist/, and vitest-pool-workers loads that
      # config when spinning up the test Worker. An absent dist/ would
      # make the pool refuse to start.
      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  # Upload a new Worker version on every PR and expose its preview URL
  # to downstream jobs (e2e-smoke). Using `wrangler versions upload
  # --preview-alias=pr-<N>` (wrangler 4.21+) keeps the preview cheap:
  # one Worker script, many versions, stable URLs per PR that update
  # on push. The alias is auto-retired when the 1000-alias cap rolls.
  #
  # Depends on `verify` so we don't burn CF API calls on builds that
  # already failed typecheck/test.
  #
  # Requires repository secrets:
  #   CLOUDFLARE_API_TOKEN — token with Workers Scripts:Edit
  #   CLOUDFLARE_ACCOUNT_ID — the Babybites account (or whichever
  #                          account the ratedwatch Worker lives in)
  # and the Worker-side secret:
  #   BETTER_AUTH_SECRET — already set once on the `ratedwatch` Worker
  #                        via `wrangler secret put`. Versions inherit
  #                        secrets from the Worker script, so no per-PR
  #                        secret provisioning is needed.
  preview:
    name: Preview deploy
    environment: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    # `Post preview URL to PR` uses GITHUB_TOKEN to leave a sticky comment.
    # Default token scope is read-only; grant PR-write here, contents-read
    # for the checkout step.
    permissions:
      contents: read
      pull-requests: write
    # Exposed so `e2e-smoke` can read the preview URL.
    outputs:
      preview-url: ${{ steps.expose-url.outputs.preview-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      # `wrangler versions upload` supports `--preview-alias=<name>`
      # (wrangler >= 4.21.0) to return a stable per-PR URL of the form
      # https://pr-<N>-<worker>.<subdomain>.workers.dev.
      #
      # `--tag` is free-form metadata that shows up in the Workers
      # dashboard and helps operators correlate a version with a PR.
      #
      # We deliberately do NOT run `wrangler deploy` — that would
      # promote the preview version to production traffic. Upload-only
      # keeps main safe.
      # `continue-on-error: true` because `wrangler versions upload` rejects
      # any wrangler.jsonc that includes a Durable Object migration (`code:
      # 10211` — migrations must be applied via a non-versioned deploy).
      # DO-migration PRs are rare but legitimate (the v2 entry that deletes
      # `DialReaderContainer` in PRD #99 slice #1 is the canonical example).
      # The `Expose preview URL` step below already gracefully handles the
      # missing-URL case (warns + exits 0), so the job passes overall and
      # `e2e-smoke` skips cleanly. Real wrangler config errors (typos,
      # missing bindings) still surface in the `verify` job earlier in the
      # workflow via typecheck + `npm run types:check`, so we're not
      # dropping safety nets here.
      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: versions upload --preview-alias=pr-${{ github.event.number }} --tag=pr-${{ github.event.number }}-${{ github.sha }}
        env:
          CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"

      # wrangler-action exposes `deployment-url` as the version-specific
      # preview URL returned by `wrangler versions upload` (i.e. the
      # `preview_url` field in wrangler's output artifact —
      # `<version-prefix>-ratedwatch.<subdomain>.workers.dev`). That
      # URL serves the same content as the `--preview-alias=pr-N` alias,
      # so it's fine to hand it to Playwright. The alias URL is still
      # posted to the PR below for human use.
      #
      # We also grep stdout for "preview alias URL:" which wrangler
      # prints alongside the versioned URL; when present it gets
      # exposed as `preview-alias-url` for operator visibility.
      #
      # When wrangler.jsonc declares a container, wrangler 4.x's
      # `versions upload` does NOT emit a preview URL — preview
      # versions can't serve traffic without a built container image
      # and `versions upload` doesn't build one (only `wrangler deploy`
      # does). In that case we treat preview-deploy as best-effort
      # success: the Worker config validated and the version uploaded,
      # we just don't have a URL to hand to E2E. Downstream e2e-smoke
      # skips when the URL is empty.
      - name: Expose preview URL
        id: expose-url
        run: |
          set -euo pipefail
          url="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$url" ]; then
            echo "::warning::wrangler-action did not emit a deployment-url (likely because wrangler.jsonc declares a container — see comment in ci.yml). Treating as best-effort success; downstream e2e-smoke will skip."
            exit 0
          fi
          echo "Preview URL: $url"
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"

          # Stdout-parse the alias URL if wrangler printed one. This is
          # purely informational — we prefer it in the PR comment because
          # it's stable across pushes to the same PR.
          stdout=$(cat <<'EOF'
          ${{ steps.deploy.outputs.command-output }}
          EOF
          )
          alias_url=$(printf '%s' "$stdout" | grep -Eo 'https?://pr-${{ github.event.number }}-[A-Za-z0-9.-]+\.workers\.dev' | head -n1 || true)
          if [ -n "$alias_url" ]; then
            echo "Alias URL: $alias_url"
            echo "alias-url=$alias_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Post preview URL to PR
        if: always() && steps.expose-url.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const versionedUrl = "${{ steps.expose-url.outputs.preview-url }}";
            const aliasUrl = "${{ steps.expose-url.outputs.alias-url }}";
            const marker = "<!-- rated-watch-preview-url -->";
            const lines = [marker, "🚀 **Preview deploy**"];
            if (aliasUrl) lines.push(`- Stable alias: ${aliasUrl}`);
            lines.push(`- This commit: ${versionedUrl}`);
            lines.push(`\nDeployed from \`${context.sha.slice(0, 7)}\`. The alias refreshes on every push.`);
            const body = lines.join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  # Run the Playwright smoke test against the preview deploy. Kept
  # separate from `verify` so a broken preview doesn't block coverage
  # reports, and because Playwright browser downloads make this job
  # ~2 min slower than the rest.
  #
  # Skips when the preview job did not emit a preview URL (this
  # happens when wrangler.jsonc declares a container — see the
  # `Expose preview URL` step in the `preview` job). Without a URL
  # there's nothing for Playwright to test against.
  e2e-smoke:
    name: E2E smoke
    if: github.event_name == 'pull_request' && needs.preview.outputs.preview-url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Playwright browsers are not bundled with the npm package; they
      # get pulled lazily. `--with-deps` installs the system libs
      # Chromium needs on the ubuntu-latest image.
      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.preview.outputs.preview-url }}
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

  # Cheat-detection regression — Slice 8 of PRD #99 (issue #107).
  #
  # Calls the real `dial-reader-bakeoff` AI Gateway with anchor-shifted
  # prompts on 2 smoke fixtures × 2 directions = 4 live model calls. Asserts
  # the model does NOT byte-echo the (false) EXIF anchor — the cheat that
  # disqualified Claude Opus 4.5 in PRD #99's bake-off. We chose GPT-5.2
  # specifically because it passes this property today; this job makes that
  # a CI-enforced invariant against future model regressions or prompt
  # weakening.
  #
  # Cost: ~$0.02 per run (4 GPT-5.2 calls @ ~$0.005 each, billed against
  # the Babybites unified-billing pool through the bake-off gateway). The
  # weekly schedule (cheat-regression-weekly.yml) handles model drift
  # outside our PRs; this job handles drift inside them.
  #
  # Path filter: we use dorny/paths-filter to compute a `relevant` flag
  # against the PR's diff. The job runs only when the diff touches
  # dial-reader-vlm, dial-cropper, the bake-off harness, or this workflow
  # file itself (so changes to the workflow are validated). This keeps
  # unrelated PRs free of gateway-credit burn. We picked dorny/paths-filter
  # over a top-level `on.pull_request.paths` clause because the existing
  # `verify` job must stay running on every PR — a workflow-level path
  # filter would gate everything together, defeating the purpose.
  #
  # Depends on `verify` so we don't burn gateway credits on builds that
  # already failed typecheck/test.
  #
  # Required repository secrets (already present from the preview job):
  #   - CLOUDFLARE_API_TOKEN  — token with AI Gateway read+edit
  #   - CLOUDFLARE_ACCOUNT_ID — Babybites account
  cheat-regression:
    name: Cheat-detection regression
    # `environment: preview` unlocks the CLOUDFLARE_API_TOKEN +
    # CLOUDFLARE_ACCOUNT_ID secrets which are scoped to that environment
    # (the only env-scoped secrets in this repo). Without this, the
    # `secrets.CLOUDFLARE_*` references resolve to empty strings and the
    # describe.skipIf in cheat-regression.node.test.ts skips the test —
    # which would silently pass CI without actually running the regression.
    environment: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'src/domain/dial-reader-vlm/**'
              - 'src/domain/dial-cropper/**'
              - 'scripts/vlm-bakeoff/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/cheat-regression-weekly.yml'

      - name: Setup Node.js
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: npm ci

      # Vitest's node-pool project picks up the `*.node.test.ts` suffix; we
      # target the file directly to keep this job under a minute even if the
      # broader test suite grows. The env vars below are what gate the
      # describe.skipIf in cheat-regression.node.test.ts — without them the
      # test silently skips, which would be a false-pass in CI. We
      # deliberately set them only here.
      - name: Run cheat-detection regression
        if: steps.filter.outputs.relevant == 'true'
        run: npx vitest run --project=node src/domain/dial-reader-vlm/__tests__/cheat-regression.node.test.ts
        env:
          CHEAT_REGRESSION_AI_GATEWAY: dial-reader-bakeoff
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip note
        if: steps.filter.outputs.relevant != 'true'
        run: echo "PR does not touch dial-reader-vlm/ or related modules — cheat-regression skipped."

  # ---------------------------------------------------------------
  # Production deploy on push to main (or manual dispatch).
  #
  # Runs `wrangler d1 migrations apply --remote` first so D1 schema
  # changes (e.g. `0008_vlm_dial_reader.sql` adding the vlm_model
  # column) are applied BEFORE the new Worker code that depends on
  # them goes live. Then `wrangler deploy --env=production`, which
  # also applies any DO migrations declared in wrangler.jsonc (the
  # v2 deletion of `DialReaderContainer` was applied this way).
  #
  # Only fires on:
  #   * push to main (auto-deploy on merge), AND
  #   * verify passing — defense-in-depth on top of the
  #     branch-protection-required check on the PR head.
  #   * NOT on PR events (gate via the `if:` below).
  #
  # Manual `workflow_dispatch` from the Actions UI also fires the
  # deploy — useful for re-running after a transient Cloudflare
  # API glitch without having to push a no-op commit.
  #
  # Concurrency group `production-deploy` queues overlapping main
  # pushes serially. We deliberately DO NOT cancel-in-progress here
  # — cancelling a half-applied migration would leave prod in a
  # weird state. Subsequent merges wait for the in-flight deploy
  # to finish.
  #
  # Required repository secrets (already provisioned for the
  # preview job): `CLOUDFLARE_API_TOKEN` (Workers Scripts:Edit +
  # D1:Edit) and `CLOUDFLARE_ACCOUNT_ID`.
  #
  # ## Rollback
  #
  # If a deploy ships a regression, roll back manually:
  #   wrangler versions list --name=ratedwatch
  #   wrangler versions deploy <previous-version-id> --name=ratedwatch
  # The `--env=production` flag is irrelevant for rollback (the
  # version-id encodes the env). For a flag-flip rollback (e.g.
  # disable verified-reading on a bad VLM rollout), use
  # `wrangler kv key put verified_reading_cv '{"mode":"never"}' --remote`
  # — the Worker stays deployed, the feature just goes off.
  deploy:
    name: Deploy to production
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    # `environment: preview` unlocks the CLOUDFLARE_API_TOKEN +
    # CLOUDFLARE_ACCOUNT_ID secrets which are scoped to that GitHub
    # Environment (the only env-scoped secrets in this repo — see
    # the same comment on the `cheat-regression` job). Without this,
    # `${{ secrets.CLOUDFLARE_API_TOKEN }}` resolves to an empty
    # string and the wrangler subprocess fails with "non-interactive
    # environment, set CLOUDFLARE_API_TOKEN" (caught by the first
    # main-branch deploy attempt on 2026-04-30, see git history of
    # this file). The "preview" name is historical — it was created
    # for the preview-deploy job. We could rename it to "deploy" or
    # add a separate "production" environment with the same secrets;
    # both feel like premature ceremony for a single-operator repo,
    # so we just reuse the existing one.
    environment: preview
    permissions:
      contents: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The SPA is served as Workers Assets at deploy time, so we
      # need a fresh `dist/` before `wrangler deploy` reads it.
      - name: Build SPA
        run: npm run build

      # D1 migrations land BEFORE the Worker so post-deploy code
      # can rely on the new schema immediately. `wrangler d1
      # migrations apply` is idempotent — it only applies migrations
      # that haven't been recorded as applied yet, so a deploy with
      # no schema change is a no-op here.
      #
      # NOTE: the wrangler-action's `apiToken:` input doesn't reliably
      # propagate to subprocess env for the `d1 migrations apply`
      # command (saw this fail on the very first auto-deploy run from
      # PR #123's merge). The `versions upload --preview-alias` flow
      # is unaffected — different code path inside the action. Setting
      # CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID explicitly via
      # the step `env:` block is the belt-and-suspenders fix.
      - name: Apply D1 migrations to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 migrations apply rated-watch-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"

      # `wrangler deploy --env=production` is what `npm run deploy`
      # resolves to (slice #9 of PRD #99 wired the env override).
      # This (a) bumps the live version of the `ratedwatch` Worker,
      # (b) applies any pending Durable Object migrations declared
      # in wrangler.jsonc, and (c) routes 100% of traffic to the
      # new version. There's no canary stage — the production
      # surface is small enough that a flag-flip rollback (KV) or
      # version-id rollback (wrangler versions deploy) is the
      # right tool when something breaks.
      #
      # Same env: belt-and-suspenders as the migration step above —
      # see comment there.
      - name: Deploy Worker to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"
