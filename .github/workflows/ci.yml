name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if a secrets file made it into the repository.
      # Runtime Worker vars belong in .dev.vars (untracked); Terraform
      # reads .env (also untracked); these filenames are the usual
      # suspects when someone accidentally `git add -f`s a secret.
      - name: Secrets sanity check
        run: |
          set -euo pipefail
          # Any path ending in .dev.vars, .env, or .env.local is a secret.
          # .env.example (anywhere) is the only allowed .env-prefixed file.
          leaked=$(git ls-files -z \
            | tr '\0' '\n' \
            | grep -E '(^|/)(\.dev\.vars|\.env|\.env\.local)$|\.dev\.vars$' \
            | grep -v -E '(^|/)\.env\.example$' || true)
          if [ -n "$leaked" ]; then
            echo "::error::Secret file(s) are tracked in git:"
            echo "$leaked"
            exit 1
          fi
          echo "No committed secret files found."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify generated worker types are in sync
        run: npm run types:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Build precedes test because wrangler.jsonc references
      # assets.directory = ./dist/, and vitest-pool-workers loads that
      # config when spinning up the test Worker. An absent dist/ would
      # make the pool refuse to start.
      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14
